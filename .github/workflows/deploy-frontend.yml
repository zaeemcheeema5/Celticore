name: Unified Frontend & Backend Production Deployment

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Get latest code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      # --- FRONTEND BUILD STEP ---
      - name: Install dependencies & Build React App
        working-directory: frontend
        run: |
          npm install
          npm run build

      # --- AUTOMATED DEPLOYMENT STEP VIA SSH ---
      - name: Deploy Frontend via rsync over SSH
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-rlgoDzvO --delete"
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USERNAME }}
          REMOTE_PORT: ${{ secrets.SSH_PORT }}
          TARGET: "/home/${{ secrets.SSH_USERNAME }}/domains/thecelticore.com/public_html/"
          SOURCE: "frontend/dist/"

      # --- AUTOMATED BACKEND DEPLOY & SUBDOMAIN ROUTING STEP ---
      - name: Deploy Backend and Configure Routing
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            # 1. Sync the backend source files into the nodejs environment root folder
            cd /home/${{ secrets.SSH_USERNAME }}/domains/thecelticore.com/
            mkdir -p nodejs
            rm -f nodejs/.htaccess
            rm -rf nodejs/*
            cp -r backend/* nodejs/

            # 2. Inject the proxy routing file into the exact subdomain directory path
            mkdir -p public_html/api
            cat << 'EOF' > public_html/api/.htaccess
            RewriteEngine On
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule ^(.*)$ http://127.0.0.1:%{ENV:PORT}/$1 [P,L]
            EOF

            # 3. Complete the dependencies installation and clear Passenger app cache
            cd nodejs
            npm install --production
            mkdir -p tmp
            touch tmp/restart.txt
