name: Unified Frontend & Backend Production Deployment

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Get latest code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      # --- FRONTEND BUILD STEP ---
      - name: Install dependencies & Build React App
        run: |
          npm install
          npm run build

      # --- AUTOMATED DEPLOYMENT STEP VIA SSH ---
      - name: Deploy Frontend via rsync over SSH
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-rlgoDzvO --delete"
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USERNAME }}
          REMOTE_PORT: ${{ secrets.SSH_PORT }}
          TARGET: "/home/${{ secrets.SSH_USERNAME }}/domains/thecelticore.com/public_html/"
          SOURCE: "dist/"

      # --- AUTOMATED BACKEND DEPLOY & SUBDOMAIN ROUTING STEP ---
      - name: Deploy Backend and Configure Routing
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /home/${{ secrets.SSH_USERNAME }}/domains/thecelticore.com/
            
            # 1. Clean out the nodejs app directory and sync fresh files
            mkdir -p nodejs
            
            # Clean up the .htaccess file from the nodejs directory if it was put there previously
            rm -f nodejs/.htaccess
            
            rm -rf nodejs/*
            cp -r backend/* nodejs/
            
            # 2. Safely place the reverse proxy rules only inside the separate subdomain folder
            if [ -d "api.thecelticore.com" ]; then
              cat << 'EOF' > api.thecelticore.com/.htaccess
            RewriteEngine On
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule ^(.*)$ http://127.0.0.1:%{ENV:PORT}/$1 [P,L]
            EOF
            fi
            
            # 3. Re-install modules and cycle the Passenger engine
            cd /home/${{ secrets.SSH_USERNAME }}/domains/thecelticore.com/nodejs
            npm install --production
            mkdir -p tmp
            touch tmp/restart.txt