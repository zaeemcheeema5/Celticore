name: Unified Frontend & Backend Production Deployment

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Get latest code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      # --- FRONTEND BUILD STEP ---
      - name: Install dependencies & Build React App
        run: |
          npm install
          npm run build

      # --- AUTOMATED DEPLOYMENT STEP VIA SSH ---
      - name: Deploy Frontend via rsync over SSH
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-rlgoDzvO --delete"
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USERNAME }}
          REMOTE_PORT: ${{ secrets.SSH_PORT }}
          TARGET: "/home/${{ secrets.SSH_USERNAME }}/domains/thecelticore.com/public_html/"
          SOURCE: "dist/"

      # --- AUTOMATED BACKEND DEPLOY & RESTART STEP ---
      - name: Deploy Backend and Restart Hostinger Application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            # Target the directory where Hostinger expects your Node app folder to live
            cd /home/${{ secrets.SSH_USERNAME }}/domains/thecelticore.com/
            
            # Ensure the target nodejs folder exists
            mkdir -p nodejs
            
            # Remove old backend files inside nodejs to prevent conflicts, then copy fresh ones
            rm -rf nodejs/*
            
            # Sync the repository's backend files straight into your active application root
            # Note: adjust 'backend/' below if your backend source directory uses a different name
            cp -r backend/* nodejs/
            
            # Go inside and install production modules fresh on the server engine
            cd nodejs
            npm install --production
            
            # Force Hostinger's Passenger manager to clear cache and reboot immediately
            mkdir -p tmp
            touch tmp/restart.txt