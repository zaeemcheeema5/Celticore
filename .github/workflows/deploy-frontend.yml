name: Unified Frontend & Backend Production Deployment

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Get latest code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      # --- FRONTEND BUILD STEP ---
      - name: Install dependencies & Build React App
        run: |
          npm install
          npm run build

      # --- AUTOMATED DEPLOYMENT STEP VIA SSH ---
      - name: Deploy Assets via rsync over SSH
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-rlgoDzvO --delete"
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USERNAME }}
          REMOTE_PORT: ${{ secrets.SSH_PORT }}
          TARGET: "/home/${{ secrets.SSH_USERNAME }}/domains/thecelticore.com/public_html/"
          SOURCE: "dist/"

      # --- AUTOMATED BACKEND DEPLOY & RESTART STEP ---
      - name: Deploy Backend and Restart Hostinger Application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /home/${{ secrets.SSH_USERNAME }}/domains/thecelticore.com/
            
            # Create nodejs directory if it doesn't exist
            mkdir -p nodejs
            
            # Sync backend folder files into the active nodejs engine directory
            cp -r backend/* nodejs/
            
            # Install production dependencies inside nodejs folder
            cd nodejs
            npm install --production
            
            # Force Hostinger's Passenger utility to reload the application instantly
            mkdir -p tmp
            touch tmp/restart.txt