<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nutrova API - Swagger UI</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/swagger-ui/5.17.14/swagger-ui.min.css">
  <style>
    html { box-sizing: border-box; overflow-y: scroll; }
    *, *:before, *:after { box-sizing: inherit; }
    body { margin: 0; background: #fafafa; }
  </style>
</head>
<body>
  <div id="swagger-ui"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/swagger-ui/5.17.14/swagger-ui-bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/swagger-ui/5.17.14/swagger-ui-standalone-preset.min.js"></script>
  <script>
    window.onload = function() {
      const spec = {"openapi": "3.0.0", "info": {"title": "Nutrova API", "version": "1.0.0", "description": "Nutrova Gym Supplement Store Backend API"}, "servers": [{"url": "http://localhost:5000"}], "paths": {"/api/wishlist": {"post": {"summary": "Add a product to the wishlist", "tags": ["Wishlist"], "requestBody": {"required": true, "content": {"application/json": {"schema": {"type": "object", "required": ["user_id", "product_id"], "properties": {"user_id": {"type": "integer", "example": 1}, "product_id": {"type": "integer", "example": 5}}}}}}, "responses": {"201": {"description": "Product added to wishlist successfully"}, "400": {"description": "Invalid request"}}}}, "/api/wishlist/{userId}": {"get": {"summary": "Get wishlist for a specific user", "tags": ["Wishlist"], "parameters": [{"in": "path", "name": "userId", "required": true, "schema": {"type": "integer"}, "example": 1}], "responses": {"200": {"description": "Wishlist retrieved successfully"}, "404": {"description": "User not found"}}}}, "/api/wishlist/item/{id}": {"delete": {"summary": "Remove an item from the wishlist", "tags": ["Wishlist"], "parameters": [{"in": "path", "name": "id", "required": true, "schema": {"type": "integer"}, "example": 10}], "responses": {"200": {"description": "Wishlist item removed successfully"}, "404": {"description": "Wishlist item not found"}}}}, "/api/wishlist/clear/{userId}": {"delete": {"summary": "Clear the entire wishlist of a user", "tags": ["Wishlist"], "parameters": [{"in": "path", "name": "userId", "required": true, "schema": {"type": "integer"}, "example": 1}], "responses": {"200": {"description": "Wishlist cleared successfully"}, "404": {"description": "User not found"}}}}, "/api/settings": {"get": {"summary": "Get store settings", "tags": ["Settings"]}, "put": {"summary": "Update settings", "tags": ["Settings"]}}, "/api/reviews": {"post": {"summary": "Add a new product review", "tags": ["Reviews"], "requestBody": {"required": true, "content": {"application/json": {"schema": {"type": "object", "required": ["product_id", "user_name", "rating", "review"], "properties": {"product_id": {"type": "integer", "example": 1}, "user_name": {"type": "string", "example": "John Doe"}, "rating": {"type": "integer", "example": 5}, "review": {"type": "string", "example": "Excellent protein powder. Highly recommended!"}}}}}}, "responses": {"201": {"description": "Review submitted successfully"}, "400": {"description": "Invalid request"}}}, "get": {"summary": "Get all reviews", "tags": ["Reviews"], "responses": {"200": {"description": "List of all reviews"}}}}, "/api/reviews/product/{productId}": {"get": {"summary": "Get reviews of a specific product", "tags": ["Reviews"], "parameters": [{"in": "path", "name": "productId", "required": true, "schema": {"type": "integer"}, "example": 1}], "responses": {"200": {"description": "List of product reviews"}}}}, "/api/reviews/{id}/approve": {"put": {"summary": "Approve a review", "tags": ["Reviews"], "parameters": [{"in": "path", "name": "id", "required": true, "schema": {"type": "integer"}, "example": 5}], "responses": {"200": {"description": "Review approved successfully"}, "404": {"description": "Review not found"}}}}, "/api/reviews/{id}/reject": {"put": {"summary": "Reject a review", "tags": ["Reviews"], "parameters": [{"in": "path", "name": "id", "required": true, "schema": {"type": "integer"}, "example": 5}], "responses": {"200": {"description": "Review rejected successfully"}, "404": {"description": "Review not found"}}}}, "/api/reviews/{id}": {"delete": {"summary": "Delete a review", "tags": ["Reviews"], "parameters": [{"in": "path", "name": "id", "required": true, "schema": {"type": "integer"}, "example": 5}], "responses": {"200": {"description": "Review deleted successfully"}, "404": {"description": "Review not found"}}}}, "/api/products": {"get": {"summary": "Get all products", "tags": ["Products"], "responses": {"200": {"description": "Product list"}}}, "post": {"summary": "Add new product", "tags": ["Products"], "responses": {"200": {"description": "Product created"}}}}, "/api/products/{id}": {"delete": {"summary": "Delete product", "tags": ["Products"], "parameters": [{"in": "path", "name": "id", "required": true}], "responses": {"200": {"description": "Product deleted"}}}}, "/api/orders": {"get": {"summary": "Get all orders", "tags": ["Orders"]}, "post": {"summary": "Place order", "tags": ["Orders"]}}, "/api/orders/{id}": {"put": {"summary": "Update order", "tags": ["Orders"]}}, "/api/nutrition": {"post": {"summary": "Submit nutrition request", "tags": ["Nutrition"]}, "get": {"summary": "Get all nutrition requests", "tags": ["Nutrition"]}}, "/api/nutrition/{id}": {"get": {"summary": "Get nutrition request", "tags": ["Nutrition"]}}, "/api/nutrition/{id}/status": {"put": {"summary": "Update request status", "tags": ["Nutrition"]}}, "/api/nutrition/{id}/notes": {"put": {"summary": "Add admin notes", "tags": ["Nutrition"]}}, "/api/dashboard": {"get": {"summary": "Get dashboard statistics", "tags": ["Dashboard"]}}, "/api/coupons": {"get": {"summary": "Get coupons", "tags": ["Coupons"]}, "post": {"summary": "Create coupon", "tags": ["Coupons"]}}, "/api/coupons/apply": {"post": {"summary": "Apply coupon", "tags": ["Coupons"]}}, "/api/coupons/{id}": {"delete": {"summary": "Delete coupon", "tags": ["Coupons"]}}, "/api/contact": {"post": {"summary": "Send a contact message", "tags": ["Contact"], "requestBody": {"required": true, "content": {"application/json": {"schema": {"type": "object", "required": ["name", "email", "subject", "message"], "properties": {"name": {"type": "string", "example": "John Doe"}, "email": {"type": "string", "example": "john@example.com"}, "subject": {"type": "string", "example": "Product Inquiry"}, "message": {"type": "string", "example": "I would like to know more about Whey Protein."}}}}}}, "responses": {"201": {"description": "Message sent successfully"}, "400": {"description": "Invalid input"}}}, "get": {"summary": "Get all contact messages", "tags": ["Contact"], "responses": {"200": {"description": "List of contact messages"}}}}, "/api/contact/{id}/read": {"put": {"summary": "Mark a contact message as read", "tags": ["Contact"], "parameters": [{"in": "path", "name": "id", "required": true, "schema": {"type": "integer"}, "example": 1}], "responses": {"200": {"description": "Message marked as read"}, "404": {"description": "Message not found"}}}}, "/api/contact/{id}": {"delete": {"summary": "Delete a contact message", "tags": ["Contact"], "parameters": [{"in": "path", "name": "id", "required": true, "schema": {"type": "integer"}, "example": 1}], "responses": {"200": {"description": "Message deleted successfully"}, "404": {"description": "Message not found"}}}}, "/api/chat/start": {"post": {"summary": "Start chat session", "tags": ["Chatbot"]}}, "/api/chat/message": {"post": {"summary": "Send chatbot message", "tags": ["Chatbot"]}}, "/api/chat/history/{sessionId}": {"get": {"summary": "Get chat history", "tags": ["Chatbot"]}}, "/api/categories": {"get": {"summary": "Get all categories", "tags": ["Categories"]}, "post": {"summary": "Create category", "tags": ["Categories"]}}, "/api/auth/signup": {"post": {"summary": "Register a new user", "tags": ["Authentication"], "requestBody": {"required": true, "content": {"application/json": {"schema": {"type": "object", "required": ["name", "email", "password"], "properties": {"name": {"type": "string", "example": "John Doe"}, "email": {"type": "string", "example": "john@example.com"}, "password": {"type": "string", "example": "Password123"}}}}}}, "responses": {"201": {"description": "User registered successfully"}, "400": {"description": "Invalid request"}}}}, "/api/auth/login": {"post": {"summary": "Login user and receive JWT token", "tags": ["Authentication"], "requestBody": {"required": true, "content": {"application/json": {"schema": {"type": "object", "required": ["email", "password"], "properties": {"email": {"type": "string", "example": "john@example.com"}, "password": {"type": "string", "example": "Password123"}}}}}}, "responses": {"200": {"description": "Login successful"}, "401": {"description": "Invalid credentials"}}}}, "/api/auth/profile": {"get": {"summary": "Get logged-in user profile", "tags": ["Authentication"], "security": [{"BearerAuth": []}], "responses": {"200": {"description": "User profile returned successfully"}, "401": {"description": "Unauthorized"}}}}}, "components": {"securitySchemes": {"BearerAuth": {"type": "http", "scheme": "bearer", "bearerFormat": "JWT"}}}, "tags": [{"name": "Wishlist", "description": "Wishlist Management APIs"}, {"name": "Settings"}, {"name": "Reviews", "description": "Product Review Management APIs"}, {"name": "Products", "description": "Product Management"}, {"name": "Orders"}, {"name": "Nutrition"}, {"name": "Dashboard"}, {"name": "Coupons"}, {"name": "Contact", "description": "Contact Form Management APIs"}, {"name": "Chatbot"}, {"name": "Categories"}, {"name": "Authentication", "description": "JWT Authentication APIs"}]};
      window.ui = SwaggerUIBundle({
        spec: spec,
        dom_id: '#swagger-ui',
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        layout: "StandaloneLayout",
        deepLinking: true
      });
    };
  </script>
</body>
</html>
